<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الفهرسة الأكاديمي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; }
        .navbar { background-color: #002b5b; border-bottom: 4px solid #b8960c; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #002b5b; border: none; }
        .marc-card { background: #222; color: #0f0; font-family: monospace; padding: 15px; border-radius: 8px; direction: ltr; white-space: pre-wrap; font-size: 0.85rem; }
        .table thead { background-color: #002b5b; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3 mb-4">
        <div class="container text-center">
            <h3 class="text-white w-100">🏛️ نظام إدارة الفهرسة والتصنيف (LCC - DDC)</h3>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- قسم الإضافة -->
            <div class="col-lg-4">
                <div class="card p-4 mb-4">
                    <h5 class="mb-3 text-primary">إضافة كتاب جديد (MARC21)</h5>
                    <div class="mb-3">
                        <label class="form-label">العنوان</label>
                        <input type="text" id="title" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">المؤلف</label>
                        <input type="text" id="author" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">رمز الكونجرس (LCC)</label>
                        <input type="text" id="lcc" class="form-control" placeholder="مثال: BP أو AZ">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الرقم الدولي (ISBN)</label>
                        <input type="text" id="isbn" class="form-control">
                    </div>
                    <button onclick="addEntry()" class="btn btn-primary w-100">إضافة وتصنيف تلقائي</button>
                </div>
            </div>

            <!-- قسم البحث والنتائج -->
            <div class="col-lg-8">
                <div class="card p-4">
                    <div class="d-flex justify-content-between mb-3">
                        <h5 class="text-primary">سجل المقتنيات والنتائج</h5>
                        <a href="/export" class="btn btn-sm btn-success">تصدير إكسل Excel</a>
                    </div>
                    
                    <div class="input-group mb-3">
                        <input type="text" id="searchInp" class="form-control" placeholder="ابحث بالعنوان...">
                        <button class="btn btn-outline-dark" onclick="searchData('starts')">يبدأ بـ</button>
                        <button class="btn btn-outline-dark" onclick="searchData('contains')">يحتوي على</button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>العنوان</th>
                                    <th>المؤلف</th>
                                    <th>LCC</th>
                                    <th>ديوي DDC</th>
                                    <th>سجل MARC21</th>
                                </tr>
                            </thead>
                            <tbody id="resTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mainData = [];

        async function addEntry() {
            const payload = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                lcc: document.getElementById('lcc').value,
                isbn: document.getElementById('isbn').value
            };
            const res = await fetch('/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const item = await res.json();
            mainData.push(item);
            render(mainData);
            alert("تم التصنيف بنجاح وفق ملف التصنيف المعتمد");
        }

        function render(data) {
            const html = data.map(item => `
                <tr>
                    <td><b>${item.title}</b></td>
                    <td>${item.author}</td>
                    <td><span class="badge bg-warning text-dark">${item.lcc}</span><br><small>${item.caption}</small></td>
                    <td><span class="badge bg-info">${item.ddc}</span></td>
                    <td><div class="marc-card">${item.marc}</div></td>
                </tr>
            `).join('');
            document.getElementById('resTable').innerHTML = html;
        }

        function searchData(mode) {
            const q = document.getElementById('searchInp').value.toLowerCase();
            const filtered = mainData.filter(i => {
                if(mode === 'starts') return i.title.toLowerCase().startsWith(q);
                return i.title.toLowerCase().includes(q);
            });
            render(filtered);
        }
    </script>
</body>
</html>
